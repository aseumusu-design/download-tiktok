<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Download Video</title>
    <meta name="theme-color" content="#ff0050">
    <meta name="description" content="Download video TikTok dan MP3 langsung otomatis.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23000000'/%3E%3Cpath d='M38 10c2 8 6 12 14 13v9c-5-.1-10-1.7-14-4.8V41c0 8.6-6.5 15-15.2 15C15.2 56 9 49.8 9 42.2 9 34.6 15.2 28.4 22.8 28.4c1.2 0 2.2.1 3.2.4v9.7c-.9-.5-1.9-.8-3.2-.8-2.9 0-5.2 2.3-5.2 5.2s2.3 5.2 5.2 5.2S28 45.8 28 42.9V10h10z' fill='%23ffffff'/%3E%3Ccircle cx='22' cy='43' r='6' fill='%2300f2ea' opacity='.95'/%3E%3Ccircle cx='25' cy='40' r='6' fill='%23ff0050' opacity='.8'/%3E%3C/svg%3E">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:radial-gradient(circle at top,#161616,#000 60%);color:#fff;min-height:100vh;padding:20px;display:flex;align-items:center;justify-content:center}
        .container{background:linear-gradient(145deg,#101010,#000);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:30px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(255,0,80,.25)}
        .header{text-align:center;margin-bottom:24px}
        .logo-wrap{width:82px;height:82px;border-radius:22px;margin:0 auto 14px;background:linear-gradient(135deg,#00f2ea,#ff0050);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 35px rgba(255,0,80,.35)}
        .logo{font-size:2.2rem;color:#fff}
        h1{font-size:1.8rem;margin-bottom:6px}
        .sub{color:#bdbdbd;font-size:14px}
        .field{position:relative;margin-bottom:16px}
        input{width:100%;padding:18px 18px 18px 20px;background:#151515;border:2px solid #2b2b2b;border-radius:16px;color:#fff;font-size:16px}
        input::placeholder{color:#777}
        input:focus{outline:none;border-color:#ff0050;box-shadow:0 0 0 4px rgba(255,0,80,.18)}
        .quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .btn{padding:16px 14px;border:none;border-radius:14px;font-weight:800;cursor:pointer;transition:all .25s;font-size:15px;color:#fff}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(255,0,80,.22)}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-video{background:linear-gradient(135deg,#ff0050,#ff3b7c)}
        .btn-audio{background:linear-gradient(135deg,#00a8a1,#00f2ea);color:#071111}
        .loading{display:none;text-align:center;padding:24px 12px}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.15);border-top:4px solid #ff0050;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .status{color:#cfcfcf;font-size:14px}
        .result{display:none;margin-top:22px;animation:fadeIn .35s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .type-badge{text-align:center;padding:14px;border-radius:14px;margin-bottom:18px;font-weight:800;font-size:1rem}
        .video-type{background:linear-gradient(45deg,#ff0050,#c5003d)}
        .photo-type{background:linear-gradient(45deg,#7a1cff,#a73dff)}
        .video-player{width:100%;height:290px;border-radius:16px;background:#111;margin-bottom:18px;box-shadow:0 14px 36px rgba(0,0,0,.45)}
        .photo-carousel{position:relative;height:300px;border-radius:16px;overflow:hidden;margin-bottom:18px;box-shadow:0 15px 40px rgba(122,28,255,.35);border:1px solid rgba(255,255,255,.08)}
        .photo-slide{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transition:opacity .35s}
        .photo-slide.active{opacity:1}
        .photo-slide img{width:100%;height:100%;object-fit:cover}
        .nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(8px);color:#fff;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;z-index:10}
        .nav-btn:hover{background:rgba(255,0,80,.85)}
        .prev{left:14px}
        .next{right:14px}
        .indicators{display:flex;justify-content:center;gap:10px;margin-bottom:18px}
        .indicator{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:all .25s}
        .indicator.active{background:#ff0050;transform:scale(1.25);box-shadow:0 0 10px rgba(255,0,80,.7)}
        .dl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
        .dl-btn{padding:15px;border:none;border-radius:13px;font-weight:800;cursor:pointer;color:#fff;text-decoration:none;text-align:center;font-size:14px;transition:all .25s}
        .dl-direct-video{background:#ff0050}
        .dl-direct-audio{background:#00b9b1;color:#071111}
        .dl-photo{background:#7a1cff}
        .dl-all{background:#343434;grid-column:1/-1}
        .dl-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,.35)}
        .tips{margin-top:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;color:#bdbdbd;font-size:13px;line-height:1.5}
        .error{display:none;background:rgba(255,0,80,.12);border:1px solid rgba(255,0,80,.45);color:#fff;padding:16px;border-radius:14px;margin-top:18px;text-align:center}
        @media(max-width:520px){
            .container{padding:24px 18px}
            .quick-actions{grid-template-columns:1fr}
            .photo-carousel,.video-player{height:240px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-wrap"><div class="logo"><i class="fa-brands fa-tiktok"></i></div></div>
            <h1>Download Video TikTok</h1>
            <p class="sub">Tempel link lalu pilih langsung download video atau MP3</p>
        </div>

        <div class="field">
            <input id="url" placeholder="Tempel link TikTok di sini..." />
        </div>

        <div class="quick-actions">
            <button class="btn btn-video" id="videoBtn" onclick="dlDirect('video')"><i class="fa-solid fa-download"></i> Download Video</button>
            <button class="btn btn-audio" id="audioBtn" onclick="dlDirect('audio')"><i class="fa-solid fa-music"></i> Download MP3</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="status" id="loadingText">Sedang memproses...</p>
        </div>

        <div class="result" id="result"></div>
        <div class="error" id="error"></div>

        <div class="tips">
            Klik tombol sesuai kebutuhan. `Download Video` langsung unduh video tanpa langkah tambahan, dan `Download MP3` langsung unduh audio.
        </div>
    </div>

    <script>
        let type='video',photos=[],video='',audio='',curPhoto=0;

        function setLoading(isLoading, text='Sedang memproses...'){
            document.getElementById('loading').style.display=isLoading?'block':'none';
            document.getElementById('loadingText').textContent=text;
            document.getElementById('videoBtn').disabled=isLoading;
            document.getElementById('audioBtn').disabled=isLoading;
        }

        function resetMessages(){
            document.getElementById('result').style.display='none';
            document.getElementById('error').style.display='none';
            document.getElementById('error').textContent='';
        }

        async function dlDirect(mode){
            const url=document.getElementById('url').value.trim();
            if(!url){showErr('Masukkan link TikTok dulu.');return}

            resetMessages();
            setLoading(true, mode==='video' ? 'Mengambil link video...' : 'Mengambil link audio MP3...');

            try{
                const data=await getData(url);
                if(data.code!==0 || !data.data) throw new Error('Link tidak valid atau data tidak ditemukan.');

                type=data.data.images?.length>0?'photo':'video';

                if(type==='video'){
                    video=data.data.hdplay || data.data.play || '';
                    audio=data.data.music || '';

                    if(mode==='video'){
                        if(!video) throw new Error('Link video tidak ditemukan.');
                        await triggerDownload(video, makeFilename('video', 'mp4'));
                        showVideoResult();
                    }else{
                        if(!audio) throw new Error('Link audio tidak ditemukan.');
                        await triggerDownload(audio, makeFilename('audio', 'mp3'));
                        showVideoResult();
                    }
                }else{
                    photos=(data.data.images||[]).map(i=>i.display||i).filter(Boolean);
                    if(mode==='audio') throw new Error('Post ini berupa foto, tidak punya file MP3.');
                    if(!photos.length) throw new Error('Foto tidak ditemukan.');
                    await triggerDownload(photos[0], makeFilename('photo-1', 'jpg'));
                    showPhotoResult();
                }
            }catch(e){
                showErr(e.message || 'Gagal memproses link.');
            }finally{
                setLoading(false);
            }
        }

        async function getData(url){
            const res=await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
            if(!res.ok) throw new Error('Gagal menghubungi server download.');
            return await res.json();
        }

        function makeFilename(kind, ext){
            const stamp=new Date().toISOString().replace(/[:.]/g,'-');
            return `tiktok-${kind}-${stamp}.${ext}`;
        }

        async function triggerDownload(fileUrl, filename){
            try{
                const res=await fetch(fileUrl);
                if(!res.ok) throw new Error('Download fetch gagal.');
                const blob=await res.blob();
                const blobUrl=URL.createObjectURL(blob);
                const a=document.createElement('a');
                a.href=blobUrl;
                a.download=filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(()=>URL.revokeObjectURL(blobUrl),2000);
            }catch(_){
                const a=document.createElement('a');
                a.href=fileUrl;
                a.download=filename;
                a.target='_blank';
                document.body.appendChild(a);
                a.click();
                a.remove();
            }
        }

        function showVideoResult(){
            const r=document.getElementById('result');
            r.innerHTML=`
                <div class="type-badge video-type">Download siap dan sudah dipicu otomatis</div>
                <video class="video-player" controls src="${video}" preload="metadata"></video>
                <div class="dl-grid">
                    <button class="dl-btn dl-direct-video" onclick="triggerDownload(video, makeFilename('video','mp4'))"><i class="fa-solid fa-video"></i> Download Video Lagi</button>
                    <button class="dl-btn dl-direct-audio" onclick="triggerDownload(audio, makeFilename('audio','mp3'))"><i class="fa-solid fa-music"></i> Download MP3 Lagi</button>
                </div>
            `;
            r.style.display='block';
        }

        function showPhotoResult(){
            const r=document.getElementById('result');
            r.innerHTML=`
                <div class="type-badge photo-type">Post foto terdeteksi</div>
                <div class="photo-carousel">
                    ${photos.map((p,i)=>`<div class="photo-slide ${i===0?'active':''}"><img src="${p}" alt="Photo ${i+1}"></div>`).join('')}
                    <button class="nav-btn prev" onclick="changeP(-1)">‹</button>
                    <button class="nav-btn next" onclick="changeP(1)">›</button>
                </div>
                <div class="indicators" id="inds"></div>
                <div class="dl-grid">
                    <button class="dl-btn dl-photo" id="curDL" onclick="triggerDownload(photos[curPhoto], makeFilename('photo-'+(curPhoto+1),'jpg'))"><i class="fa-solid fa-image"></i> Download Foto 1</button>
                    <button class="dl-btn dl-all" onclick="dlAll(event)"><i class="fa-solid fa-box-archive"></i> Download Semua Foto</button>
                </div>
            `;
            document.getElementById('inds').innerHTML=photos.map((_,i)=>`<div class="indicator ${i===0?'active':''}" onclick="goP(${i})"></div>`).join('');
            r.style.display='block';
        }

        function changeP(d){
            curPhoto=(curPhoto+d+photos.length)%photos.length;
            updateP();
        }

        function goP(i){
            curPhoto=i;
            updateP();
        }

        function updateP(){
            document.querySelectorAll('.photo-slide').forEach((s,i)=>s.classList.toggle('active',i===curPhoto));
            document.querySelectorAll('.indicator').forEach((ind,i)=>ind.classList.toggle('active',i===curPhoto));
            const btn=document.getElementById('curDL');
            if(btn) btn.innerHTML=`<i class="fa-solid fa-image"></i> Download Foto ${curPhoto+1}`;
        }

        function dlAll(e){
            e.preventDefault();
            photos.forEach((p,i)=>{
                setTimeout(()=>triggerDownload(p, makeFilename(`photo-${i+1}`,'jpg')),i*350);
            });
        }

        function showErr(message){
            const err=document.getElementById('error');
            err.textContent=`❌ ${message}`;
            err.style.display='block';
        }

        document.getElementById('url').addEventListener('keypress',e=>{
            if(e.key==='Enter') dlDirect('video');
        });

        document.addEventListener('keydown',e=>{
            if(type==='photo'){
                if(e.key==='ArrowLeft') changeP(-1);
                if(e.key==='ArrowRight') changeP(1);
            }
        });

        document.getElementById('url').focus();
    </script>
</body>
</html>
