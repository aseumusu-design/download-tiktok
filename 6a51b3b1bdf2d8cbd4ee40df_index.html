<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader</title>
    <meta name="theme-color" content="#ff0050">
    <meta name="description" content="Download video TikTok dan MP3 dengan tampilan sederhana, file terpisah, dan siap hosting GitHub Pages.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23000000'/%3E%3Cpath d='M38 10c2 8 6 12 14 13v9c-5-.1-10-1.7-14-4.8V41c0 8.6-6.5 15-15.2 15C15.2 56 9 49.8 9 42.2 9 34.6 15.2 28.4 22.8 28.4c1.2 0 2.2.1 3.2.4v9.7c-.9-.5-1.9-.8-3.2-.8-2.9 0-5.2 2.3-5.2 5.2s2.3 5.2 5.2 5.2S28 45.8 28 42.9V10h10z' fill='%23ffffff'/%3E%3Ccircle cx='22' cy='43' r='6' fill='%2300f2ea' opacity='.95'/%3E%3Ccircle cx='25' cy='40' r='6' fill='%23ff0050' opacity='.8'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="page">
        <section class="container">
            <header class="header">
                <div class="logo-wrap">
                    <i class="fa-brands fa-tiktok logo"></i>
                </div>
                <h1>TikTok Downloader</h1>
                <p class="sub">Tempel link TikTok lalu download video atau MP3 secara langsung</p>
            </header>

            <div class="field">
                <input id="url" type="url" placeholder="Tempel link TikTok di sini..." autocomplete="off">
            </div>

            <div class="quick-actions">
                <button class="btn btn-video" id="videoBtn" type="button">
                    <i class="fa-solid fa-download"></i>
                    <span>Download Video</span>
                </button>
                <button class="btn btn-audio" id="audioBtn" type="button">
                    <i class="fa-solid fa-music"></i>
                    <span>Download MP3</span>
                </button>
            </div>

            <div class="loading hidden" id="loading">
                <div class="spinner"></div>
                <p class="status" id="loadingText">Sedang memproses...</p>
            </div>

            <div class="result hidden" id="result"></div>
            <div class="error hidden" id="error"></div>

            <div class="tips">
                Paket ini sudah dipisah jadi file `HTML`, `CSS`, dan `JS` agar lebih enak diupload ke GitHub Pages.
            </div>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
